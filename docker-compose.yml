version: "3.8"

services:

  api:
    build: .
    container_name: item_api
    ports:
      - "5000:80"
    depends_on:
      - db
    environment:
      - ConnectionStrings__DefaultConnection=Server=db;Database=ItemDb;User=sa;Password=Your_password123;TrustServerCertificate=True

  db:
    image: mcr.microsoft.com/mssql/server
    container_name: item_db
    environment:
      SA_PASSWORD: "Your_password123"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"